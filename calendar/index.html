<style>
:root {
  --tooltip-color: #ffc;
}
:root[data-theme="0"].dark,
:root[data-theme="2"] {
  --tooltip-color: #443;
}
*,
*::before,
*::after {
  box-sizing: border-box;
  font-family: "Courier", monospace;
  font-size: small;
}
table {
  border-collapse: collapse;
  margin: 2em;
  border: 1px solid var(--color);
  & * {
    margin: 0;
    padding: 0;
  }
}
caption {
  font-size: large;
  font-weight: bold;
  margin: 0.5em;
}
th {
  border: 1px solid var(--color);
  &:first-child {
    color: #f42;
  }
  &:last-child {
    color: #24f;
  }
}
td {
  border: 1px solid var(--color);
  position: relative;
  &.today::after {
    content: "";
    border: 5px solid #24f;
    border-radius: 3px;
    display: block;
    position: absolute;
    inset: -3px;
    z-index: 5;
    pointer-events: none;
  }
  & div {
    position: relative;
    text-align: center;
    align-content: center;
    width: 2.5em;
    height: 2.5em;
    &.mark {
      background-color: #f323;
    }
    &[data-names]:hover::after {
      position: absolute;
      content: attr(data-names);
      display: block;
      left: 15%;
      bottom: 85%;
      width: max-content;
      white-space: pre-wrap;
      border: 1px solid var(--color);
      background-color: var(--tooltip-color);
      border-radius: 0.3rem;
      padding: 0.3em 0.7em;
      min-width: 7em;
      z-index: 10;
      pointer-events: none;
    }
  }
}
</style>

  const table = new Map();

  for(const [name, month, date] of data){
    const key = month * 100 + date;
    const list = table.get(key) || [];
    list.push(name);
    table.set(key, list);
  }
  return table;
};

document.addEventListener("DOMContentLoaded", () => {
  const container = create("div");
  const now = new Date();
  let year = now.getFullYear();
  const today = 100 + now.getMonth() * 100 + now.getDate();
  let count = 12;
  let month = now.getMonth();
  while(count--){
    month %= 12;
    if(!month) ++year;
    const days = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][month];
    let space = new Date(year, month, 1).getDay();
    const table = create("table");
    table.createCaption().textContent = ++month;
    const header = table.insertRow();
    for(const label of "日月火水木金土"){
      const th = create("th");
      th.textContent = label;
      header.append(th);
    }
    let date = 0;
    let tr = table.insertRow();
    while(space--) tr.insertCell();
    while(days > date++){
      const key = month * 100 + date;
      const list = data.get(key) || [];
      if(tr.cells.length === 7) tr = table.insertRow();
      const names = [];
      let current = create("div");
      const cell = tr.insertCell();
      if(key === today) cell.className = "today";
      cell.append(current);
      for(const name of list){
        const div = create("div");
        div.className = "mark";
        current.append(div);
        current = div;
        names.push(name);
      }
      current.textContent = date;
      if(names.length) current.dataset.names = `${month}/${date}\n${names.join("\n")}`;
    }
    while(7 > tr.cells.length) tr.insertCell();
    container.append(table);
  }
  document.body.prepend(container);
});
